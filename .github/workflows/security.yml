name: security

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  audit:
    runs-on: windows-2025-vs2026
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"
      - name: Install development dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Secret, source, AST, constant, graph, and tracking scan
        run: openclaw-advisor security-scan --include-history --strict | Tee-Object -FilePath security-scan.json
      - name: Validate skills
        run: openclaw-advisor validate-skills --strict
      - name: Validate config template
        run: openclaw-advisor render-config --validate --strict
      - name: Dependency vulnerability scan
        run: python -m pip_audit
      - name: Upload security audit artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: security-scan-json
          path: security-scan.json
          if-no-files-found: error
