name: security

on:
  push:
    branches: [main]
  pull_request:

jobs:
  audit:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install development dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Secret, source, AST, constant, graph, and tracking scan
        run: openclaw-advisor security-scan --include-history --strict
      - name: Validate skills
        run: openclaw-advisor validate-skills --strict
      - name: Validate config template
        run: openclaw-advisor render-config --validate --strict
      - name: Dependency vulnerability scan
        run: python -m pip_audit
