name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    runs-on: windows-2025-vs2026
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"
      - name: Install development dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Pip dependency check
        run: python -m pip check
      - name: Ruff
        run: python -m ruff check .
      - name: Mypy
        run: python -m mypy engine\src
      - name: Prepare pytest temp directory
        run: New-Item -ItemType Directory -Force .\_tmp | Out-Null
      - name: Pytest non-live
        run: python -m pytest -m "not live" -q --basetemp .\_tmp\ci-pytest
      - name: Pytest functional subsets
        run: |
          python -m pytest engine\tests\unit -q
          python -m pytest engine\tests\integration -q
          python -m pytest engine\tests\security -q
      - name: Full-suite coverage gate
        run: python -m pytest -m "not live" --cov=openclaw_super_advisor --cov-branch --cov-report=term-missing --cov-report=json:docs/P2_COVERAGE.json --cov-fail-under=85
      - name: Skill validation
        run: openclaw-advisor validate-skills --strict
      - name: Agent topology validation
        run: openclaw-advisor validate-agents --strict
      - name: Routing validation
        run: openclaw-advisor validate-routing --strict
      - name: Config template validation
        run: openclaw-advisor render-config --validate --strict
      - name: Coverage artifact check
        run: if (!(Test-Path docs\P2_COVERAGE.json)) { throw "docs\P2_COVERAGE.json was not generated" }
      - name: Package build
        run: python -m pip wheel . --no-deps --wheel-dir dist
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ci-coverage-json
          path: docs/P2_COVERAGE.json
          if-no-files-found: error
