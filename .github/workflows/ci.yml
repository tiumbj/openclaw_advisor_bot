name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install development dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Ruff
        run: python -m ruff check .
      - name: Mypy
        run: python -m mypy engine\src
      - name: Pytest
        run: python -m pytest -m "not live"
      - name: Coverage
        run: python -m pytest -m "not live" --cov=openclaw_super_advisor --cov-report=term-missing --cov-report=json
      - name: Skill validation
        run: openclaw-advisor validate-skills --strict
      - name: Config template validation
        run: openclaw-advisor render-config --validate --strict
