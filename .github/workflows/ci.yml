name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    runs-on: windows-2025-vs2026
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"
      - name: Install development dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Ruff
        run: python -m ruff check .
      - name: Mypy
        run: python -m mypy engine\src
      - name: Pytest
        run: python -m pytest -m "not live"
      - name: Coverage
        run: python -m pytest -m "not live" --cov=openclaw_super_advisor --cov-report=term-missing --cov-report=json
      - name: Skill validation
        run: openclaw-advisor validate-skills --strict
      - name: Config template validation
        run: openclaw-advisor render-config --validate --strict
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ci-coverage-json
          path: docs/P2_COVERAGE.json
          if-no-files-found: error
